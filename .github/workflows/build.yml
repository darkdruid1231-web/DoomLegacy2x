name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-build:
    runs-on: windows-latest
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup sccache cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/.sccache
        key: ${{ runner.os }}-sccache-${{ hashFiles('legacy/trunk/**.[ch]pp', 'legacy/trunk/CMakeLists.txt', 'legacy/trunk/**/CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-sccache-

    - name: Set up MSYS2 MinGW64
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-sccache
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_mixer
          mingw-w64-x86_64-libpng
          mingw-w64-x86_64-libjpeg-turbo
          mingw-w64-x86_64-openal
          mingw-w64-x86_64-libvorbis
          mingw-w64-x86_64-flac
          mingw-w64-x86_64-mpg123
          mingw-w64-x86_64-opus
          mingw-w64-x86_64-wavpack
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-freetype
          mingw-w64-x86_64-enet
          flex
          lemon
          bison

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        mkdir -p legacy/trunk/build-windows
        cd legacy/trunk/build-windows
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
          ..

    - name: Build
      shell: msys2 {0}
      run: |
        cd legacy/trunk/build-windows
        ninja -j4

    - name: sccache stats
      if: always()
      shell: msys2 {0}
      run: sccache --show-stats

    - name: Gather release files
      shell: msys2 {0}
      run: |
        mkdir -p legacy/trunk/release
        cd legacy/trunk/release
        cp ../build-windows/doomlegacy.exe .
        ldd doomlegacy.exe | grep '/mingw64/' | awk '{print $3}' | xargs -I{} cp {} .
        cp ../resources/legacy.wad .

    - name: Upload Windows release
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows
        path: legacy/trunk/release/
        retention-days: 30
        if-no-files-found: error
