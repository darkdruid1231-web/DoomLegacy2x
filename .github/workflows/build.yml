name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake \
            g++ \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libpng-dev \
            libjpeg-dev \
            libenet-dev \
            flex \
            lemon
    
    - name: Install TNL library (legacy networking)
      run: |
        # Clone and build TNL for legacy networking support
        cd /tmp
        git clone --depth 1 https://github.com/lichdr/TNL.git
        cd TNL
        make -j2
        sudo cp -r include/tnl /usr/local/include/
        sudo cp lib/libtnl.a /usr/local/lib/ || true
        sudo cp lib/libtomcrypt.a /usr/local/lib/ || true

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -S legacy/trunk -DUSE_MODERN_NETWORKING=OFF

    - name: Build
      run: cmake --build build --parallel

    - name: Run Tests
      working-directory: build
      run: ctest --output-on-failure --verbose
