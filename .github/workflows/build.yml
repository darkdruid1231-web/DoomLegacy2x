name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux build with container for consistency
  linux-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Linux binaries
      run: make ci-linux

    - name: Upload Linux executables and tools
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-linux-executables
        path: |
          legacy/trunk/build-linux/doomlegacy
          legacy/trunk/build-linux/d2h
          legacy/trunk/build-linux/wadtool
        retention-days: 30
        if-no-files-found: warn

  # Windows cross-compilation using container
  windows-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build Windows binaries
      run: make ci-windows

    - name: Upload Windows executables and tools
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows-executables
        path: |
          legacy/trunk/build-windows/doomlegacy.exe
          legacy/trunk/build-windows/d2h.exe
          legacy/trunk/build-windows/wadtool.exe
        retention-days: 30
        if-no-files-found: warn

  # Clang build for additional compiler validation
  clang-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build with Clang
      run: make ci-clang

    - name: Upload Clang executables and tools
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-clang-executables
        path: |
          legacy/trunk/build-clang/doomlegacy
          legacy/trunk/build-clang/d2h
          legacy/trunk/build-clang/wadtool
        retention-days: 30
        if-no-files-found: warn