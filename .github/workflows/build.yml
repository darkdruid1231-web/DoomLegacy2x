name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake \
            g++ \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libpng-dev \
            libjpeg-dev \
            libenet-dev \
            flex \
            lemon

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release -S legacy/trunk -DUSE_MODERN_NETWORKING=OFF

    - name: Build tests only
      run: |
        cd legacy/trunk
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_MODERN_NETWORKING=OFF
        # Build only test executables (skip main doomlegacy which requires full networking)
        cmake --build . --target test_fixed_t test_fixed_catch2 test_save_load_unit test_serialization test_actor test_console test_vector --parallel

    - name: Run Tests
      working-directory: legacy/trunk/build
      run: ctest --output-on-failure --verbose -E "tnl|network"
