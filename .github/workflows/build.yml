name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up MSYS2 MinGW64
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_mixer
          mingw-w64-x86_64-libpng
          mingw-w64-x86_64-libjpeg-turbo
          mingw-w64-x86_64-openal
          mingw-w64-x86_64-libvorbis
          mingw-w64-x86_64-flac
          mingw-w64-x86_64-mpg123
          mingw-w64-x86_64-opus
          mingw-w64-x86_64-wavpack
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-freetype
          mingw-w64-x86_64-enet
          flex
          lemon
          bison

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        mkdir -p legacy/trunk/build-windows
        cd legacy/trunk/build-windows
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release \
          -DFLEX_EXECUTABLE=C:/msys64/usr/bin/flex.exe \
          -DLEMON_EXECUTABLE=C:/msys64/usr/bin/lemon.exe \
          ..

    - name: Build
      shell: msys2 {0}
      run: |
        cd legacy/trunk/build-windows
        ninja -j4

    - name: Upload Windows executables
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows-executables
        path: legacy/trunk/build-windows/doomlegacy.exe
        retention-days: 30
        if-no-files-found: warn
