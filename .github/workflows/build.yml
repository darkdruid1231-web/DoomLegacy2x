    #     cppcheck \
    #       --enable=warning,style,performance,portability \
    #       --suppress=missingIncludeSystem \
    #       --suppress=unmatchedSuppression \
    #       --std=c++11 \
    #       --platform=win64 \
    #       -I legacy/trunk/include \
    #       -I legacy/trunk/include/core \
    #       -I legacy/trunk/include/game \
    #       -I legacy/trunk/include_stubs \
    #       --error-exitcode=0 \
    #       --output-file=cppcheck-report.txt \
    #       legacy/trunk/engine legacy/trunk/util legacy/trunk/video \
    #       2>&1 | tail -20 || true
    #     echo "=== cppcheck summary ==="
    #     grep -c "error\|warning" cppcheck-report.txt 2>/dev/null && \
    #       echo "Full report: cppcheck-report.txt" || echo "No issues found"
