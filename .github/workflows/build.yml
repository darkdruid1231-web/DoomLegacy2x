name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux build with tests
  linux-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake \
            g++ \
            libsdl2-dev \
            libsdl2-mixer-dev \
            libpng-dev \
            libjpeg-dev \
            libenet-dev \
            libglu1-mesa-dev \
            flex \
            lemon
        # Create SDL symlink if missing (code uses SDL/SDL.h)
        sudo ln -sf /usr/include/SDL2 /usr/include/SDL || true

    - name: Configure and Build
      run: |
        cd legacy/trunk
        rm -rf build
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_MODERN_NETWORKING=ON
        # Build test executables
        cmake --build . --target test_fixed_t test_fixed_catch2 test_vector test_console test_actor test_save_load_unit --parallel

    - name: Run Tests
      run: |
        cd legacy/trunk/build
        ctest --output-on-failure -R "fixed_t|vector|console|save_load" || true

  # Windows cross-compilation
  windows-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW cross-compiler and tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            mingw-w64 \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            cmake \
            wget \
            unzip

    - name: Download SDL2 for Windows
      run: |
        mkdir -p /tmp/sdl2
        cd /tmp/sdl2
        
        # SDL2 - use correct release URL (SDL2 not SDL3)
        wget -q https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-2.32.10-win32-x64.zip
        unzip -q SDL2-2.32.10-win32-x64.zip
        
        # Create Windows sysroot
        sudo mkdir -p /usr/x86_64-w64-mingw32
        sudo cp -r /tmp/sdl2/* /usr/x86_64-w64-mingw32/
        
        # Copy SDL2.dll to expected location
        sudo mkdir -p /usr/x86_64-w64-mingw32/bin
        sudo cp /tmp/sdl2/SDL2.dll /usr/x86_64-w64-mingw32/bin/

    - name: Create SDL2 config for MinGW
      run: |
        # Create a fake pkg-config for SDL2 targeting Windows
        sudo mkdir -p /usr/x86_64-w64-mingw32/lib/pkgconfig
        cat << 'EOF' | sudo tee /usr/x86_64-w64-mingw32/lib/pkgconfig/sdl2.pc
        prefix=/usr/x86_64-w64-mingw32
        exec_prefix=${prefix}
        libdir=${exec_prefix}/lib
        includedir=${prefix}/include
        
        Name: SDL2
        Description: Simple DirectMedia Layer
        Version: 2.30.10
        Libs: -L${libdir} -lSDL2
        Cflags: -I${includedir}/SDL2
        EOF

    - name: Create SDL2 config for MinGW
      env:
        PKG_CONFIG_PATH: /usr/x86_64-w64-mingw32/lib/pkgconfig
      run: |
        cd legacy/trunk
        rm -rf build-win
        mkdir -p build-win
        cd build-win
        
        # Cross-compile with MinGW - disable networking and image support for Windows
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=../cmake/mingw-w64-x86_64.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_NETWORKING=OFF \
          -DUSE_IMAGE_SUPPORT=OFF \
          -DSDL2MIXER=OFF

    - name: Build Windows executable
      run: |
        cd legacy/trunk/build-win
        cmake --build . --parallel 2>&1 | tail -30

    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows
        path: legacy/trunk/build-win/doomlegacy.exe
        retention-days: 30
