  # Windows cross-compilation with GCC + MinGW (disabled - header issues)
  windows-gcc-build:
    if: false
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW cross-compiler and tools
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            mingw-w64 \
            g++-mingw-w64-x86-64 \
            gcc-mingw-w64-x86-64 \
            cmake \
            libsdl1.2-dev \
            wget \
            unzip \
            lemon

    - name: Download SDL2 for Windows
      run: |
        mkdir -p /tmp/sdl2
        cd /tmp/sdl2

        # SDL2 - download development libraries for MinGW (includes headers)
        wget -q https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-devel-2.32.10-mingw.tar.gz
        tar -xzf SDL2-devel-2.32.10-mingw.tar.gz

        # SDL2_mixer - download development libraries for MinGW
        wget -q https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-devel-2.8.0-mingw.tar.gz
        tar -xzf SDL2_mixer-devel-2.8.0-mingw.tar.gz

        # Create Windows sysroot
        sudo mkdir -p /usr/x86_64-w64-mingw32
        sudo cp -r /tmp/sdl2/SDL2-2.32.10/x86_64-w64-mingw32/* /usr/x86_64-w64-mingw32/
        sudo cp -r /tmp/sdl2/SDL2_mixer-2.8.0/x86_64-w64-mingw32/* /usr/x86_64-w64-mingw32/

        # Copy DLLs to expected location
        sudo mkdir -p /usr/x86_64-w64-mingw32/bin
        sudo cp /tmp/sdl2/SDL2-2.32.10/x86_64-w64-mingw32/bin/SDL2.dll /usr/x86_64-w64-mingw32/bin/
        sudo cp /tmp/sdl2/SDL2_mixer-2.8.0/x86_64-w64-mingw32/bin/SDL2_mixer.dll /usr/x86_64-w64-mingw32/bin/

    - name: Create SDL2 config for LLVM MinGW
      run: |
        # Create a fake pkg-config for SDL2 targeting Windows
        sudo mkdir -p /usr/x86_64-w64-mingw32/lib/pkgconfig
        cat << 'EOF' | sudo tee /usr/x86_64-w64-mingw32/lib/pkgconfig/sdl2.pc
        prefix=/usr/x86_64-w64-mingw32
        exec_prefix=${prefix}
        libdir=${exec_prefix}/lib
        includedir=${prefix}/include

        Name: SDL2
        Description: Simple DirectMedia Layer
        Version: 2.30.10
        Libs: -L${libdir} -lSDL2
        Cflags: -I${includedir}/SDL2
        EOF
        cat << 'EOF' | sudo tee /usr/x86_64-w64-mingw32/lib/pkgconfig/SDL2_mixer.pc
        prefix=/usr/x86_64-w64-mingw32
        exec_prefix=${prefix}
        libdir=${exec_prefix}/lib
        includedir=${prefix}/include

        Name: SDL2_mixer
        Description: Simple DirectMedia Layer Mixer
        Version: 2.8.0
        Libs: -L${libdir} -lSDL2_mixer
        Cflags: -I${includedir}/SDL2
        Requires: SDL2
        EOF

    - name: Build and install zlib for MinGW
      run: |
        cd /tmp
        wget -q https://github.com/madler/zlib/archive/refs/tags/v1.2.11.tar.gz -O zlib-src.tar.gz
        tar -xzf zlib-src.tar.gz
        cd zlib-1.2.11
        # Use --static to avoid building shared library which requires -lc (not available for MinGW)
        CC=x86_64-w64-mingw32-gcc-posix ./configure --prefix=/usr/x86_64-w64-mingw32 --static
        make -j4
        sudo cp zlib.h zconf.h /usr/x86_64-w64-mingw32/include/
        sudo cp libz.a /usr/x86_64-w64-mingw32/lib/

    - name: Build ENet for MinGW
      run: |
        cd /tmp
        # Download ENet source
        wget -q https://github.com/lsalzman/enet/archive/refs/tags/v1.3.17.tar.gz -O enet.tar.gz
        tar -xzf enet.tar.gz
        cd enet-1.3.17
        # Compile each source file individually
        mkdir -p lib
        for f in callbacks compress host list packet peer protocol win32; do
          x86_64-w64-mingw32-gcc-posix -c -O2 -Iinclude ${f}.c -o lib/${f}.o
        done
        x86_64-w64-mingw32-ar rcs lib/libenet.a lib/*.o
        # Install into include/enet/ subdir so enet/time.h does NOT shadow the
        # real Windows time.h in the root include dir (which breaks <ctime>).
        sudo mkdir -p /usr/x86_64-w64-mingw32/include/enet
        sudo cp include/enet/*.h /usr/x86_64-w64-mingw32/include/enet/
        sudo cp lib/libenet.a /usr/x86_64-w64-mingw32/lib/

    - name: Configure CMake for MinGW
      env:
        PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/x86_64-w64-mingw32/lib/pkgconfig
      run: |
        cd legacy/trunk
        rm -rf build-win
        mkdir -p build-win
        cd build-win

        # Unset conflicting include paths to prevent Linux header leakage
        unset C_INCLUDE_PATH
        unset CPLUS_INCLUDE_PATH
        unset INCLUDE
        unset CPATH
        # Debug: Show what paths are active
        echo "C_INCLUDE_PATH after unset: '$C_INCLUDE_PATH'"
        echo "CPLUS_INCLUDE_PATH after unset: '$CPLUS_INCLUDE_PATH'"
        echo "CPATH after unset: '$CPATH'"
        echo "INCLUDE after unset: '$INCLUDE'"

        # Set pkg-config path for MinGW
        export PKG_CONFIG_PATH=/usr/x86_64-w64-mingw32/lib/pkgconfig:$PKG_CONFIG_PATH

        # Cross-compile with MinGW.
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=../cmake/mingw-w64-x86_64.cmake \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_FLAGS="-Wno-inline -Wno-missing-attributes" \
          -DUSE_SDL2=ON \
          -DUSE_IMAGE_SUPPORT=OFF \
          -DUSE_NETWORKING=ON \
          -DENET_INCLUDE_DIR=/usr/x86_64-w64-mingw32/include \
          -DENET_LIBRARY=/usr/x86_64-w64-mingw32/lib/libenet.a

    - name: Build Windows test executables (cross-compile)
      run: |
        cd legacy/trunk/build-win
        # Build test targets only - the full game requires additional code fixes
        # (missing mobjtype_t entries, g_mapinfo cast issues) that are tracked
        # separately.  Tests validate the core logic compiles for Windows ABI.
        cmake --build . --target test_fixed_t test_vector test_console test_actor test_save_load_unit --parallel

    - name: Upload Windows cross-compile test artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows-cross-tests
        path: |
          legacy/trunk/build-win/test_fixed_t.exe
          legacy/trunk/build-win/test_fixed_catch2.exe
          legacy/trunk/build-win/test_vector.exe
          legacy/trunk/build-win/test_console.exe
          legacy/trunk/build-win/test_actor.exe
          legacy/trunk/build-win/test_save_load_unit.exe
        retention-days: 30
        if-no-files-found: warn

  # Windows cross-compilation with Docker + LLVM MinGW
  windows-cross-build:
    runs-on: self-hosted
    container: mstorsjo/llvm-mingw:latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: windows-build

    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y cmake libsdl2-dev libenet-dev libglu1-mesa-dev libpng-dev libjpeg-dev flex lemon

    - name: Configure and Build Windows Executables
      run: |
        cd windows-build/legacy/trunk
        mkdir -p build-win
        cd build-win

        # Use container's MinGW tools - no toolchain file needed
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_SDL2=ON \
          -DUSE_IMAGE_SUPPORT=OFF \
          -DUSE_NETWORKING=ON \
          -DCMAKE_CXX_FLAGS="-DSDL2"

        # Build main executable and tools
        cmake --build . --target doomlegacy d2h wadtool --parallel 4

    - name: Upload Windows executables and tools
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-windows-executables
        path: |
          windows-build/legacy/trunk/build-win/doomlegacy.exe
          windows-build/legacy/trunk/build-win/d2h.exe
          windows-build/legacy/trunk/build-win/wadtool.exe
        retention-days: 30
        if-no-files-found: warn

