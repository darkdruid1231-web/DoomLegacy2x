name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-build:
    runs-on: windows-latest
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup sccache cache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.sccache
        key: ${{ runner.os }}-sccache-${{ hashFiles('src/**.[ch]pp', 'src/CMakeLists.txt', 'src/**/CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-sccache-

    - name: Set up MSYS2 MinGW64
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-ninja
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-pkg-config
          mingw-w64-x86_64-sccache
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-libpng
          mingw-w64-x86_64-libjpeg-turbo
          mingw-w64-x86_64-openal
          mingw-w64-x86_64-libvorbis
          mingw-w64-x86_64-flac
          mingw-w64-x86_64-mpg123
          mingw-w64-x86_64-opus
          mingw-w64-x86_64-wavpack
          mingw-w64-x86_64-zlib
          mingw-w64-x86_64-freetype
          mingw-w64-x86_64-enet
          flex
          lemon
          bison
          zip

    - name: Download SDL3
      shell: bash
      run: |
        curl -L -o SDL3.zip https://github.com/libsdl-org/SDL/releases/download/release-3.2.0/SDL3-devel-3.2.0-mingw.tar.gz
        tar -xzf SDL3.zip -C /mingw64
        rm SDL3.zip

    - name: Download SDL3_mixer
      shell: bash
      run: |
        curl -L -o SDL3_mixer.tar.gz https://github.com/libsdl-org/SDL_mixer/releases/download/release-3.2.0/SDL3_mixer-devel-3.2.0-mingw.tar.gz
        tar -xzf SDL3_mixer.tar.gz -C /mingw64
        rm SDL3_mixer.tar.gz

    - name: Cache MSYS2 packages
      uses: actions/cache@v5
      with:
        path: C:\msys64\var\cache\pacman\pkg
        key: ${{ runner.os }}-msys2-pkg-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: ${{ runner.os }}-msys2-pkg-

    - name: Configure CMake
      shell: msys2 {0}
      run: |
        export PKG_CONFIG_PATH="/mingw64/lib/pkgconfig:$PKG_CONFIG_PATH"
        mkdir -p src/build-windows
        cd src/build-windows
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
          -DSDL3_DIR=/mingw64 \
          ..

    - name: Build
      shell: msys2 {0}
      run: |
        cd src/build-windows
        ninja -j4

    - name: Run tests
      shell: msys2 {0}
      run: |
        cd src/build-windows
        ctest --output-on-failure

    - name: sccache stats
      if: always()
      shell: msys2 {0}
      run: sccache --show-stats

    - name: Build legacy.wad
      shell: msys2 {0}
      run: bash src/build_wad.sh src/release/legacy.wad

    - name: Gather release files
      shell: msys2 {0}
      run: |
        mkdir -p src/release
        cp src/build-windows/doomlegacy.exe src/release/
        ldd src/build-windows/doomlegacy.exe | grep '/mingw64/' | awk '{print $3}' | xargs -I{} cp {} src/release/

    - name: Package release
      shell: msys2 {0}
      run: |
        cd src/release
        zip -r ../doomlegacy-windows.zip .

    - name: Upload Windows release
      uses: actions/upload-artifact@v5
      with:
        name: doomlegacy-windows
        path: src/doomlegacy-windows.zip
        retention-days: 30
        if-no-files-found: error

  linux-build:
    runs-on: ubuntu-latest
    env:
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Setup sccache cache
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.sccache
        key: ${{ runner.os }}-sccache-${{ hashFiles('src/**.[ch]pp', 'src/CMakeLists.txt', 'src/**/CMakeLists.txt') }}
        restore-keys: ${{ runner.os }}-sccache-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build pkg-config sccache \
          gcc g++ \
          libsdl3-dev \
          libglew-dev \
          libpng-dev libjpeg-dev \
          zlib1g-dev \
          libopenal-dev \
          libvorbis-dev libflac-dev libmpg123-dev libopus-dev libopusfile-dev \
          libfreetype-dev \
          libenet-dev \
          libwavpack-dev \
          flex bison lemon \
          patchelf

    - name: Configure CMake
      run: |
        mkdir -p src/build-linux
        cd src/build-linux
        cmake -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache \
          ..

    - name: Build
      run: |
        cd src/build-linux
        ninja -j$(nproc)

    - name: Run tests
      run: |
        cd src/build-linux
        ctest --output-on-failure

    - name: sccache stats
      if: always()
      run: sccache --show-stats

    - name: Build legacy.wad
      run: |
        mkdir -p src/release-linux
        bash src/build_wad.sh src/release-linux/legacy.wad

    - name: Gather release files
      run: |
        mkdir -p src/release-linux
        cp src/build-linux/doomlegacy src/release-linux/

    - name: Create portable Linux bundle
      run: |
        # Create directory structure
        mkdir -p src/portable/usr/bin
        mkdir -p src/portable/usr/lib
        mkdir -p src/portable/usr/share/applications

        # Copy binary
        cp src/build-linux/doomlegacy src/portable/usr/bin/

        # Copy legacy.wad
        cp src/release-linux/legacy.wad src/portable/usr/bin/

        # Copy all required libraries
        ldd src/build-linux/doomlegacy | grep "=>" | awk '{print $3}' | grep -v "^$" | while read lib; do
          if [ -f "$lib" ]; then
            mkdir -p "src/portable/usr/lib/$(dirname "$lib" | sed 's|/usr/lib/x86_64-linux-gnu||' | sed 's|/usr/lib||')"
            cp -L "$lib" "src/portable/usr/lib/" 2>/dev/null || true
          fi
        done

        # Also copy key SDL/GL libraries by name
        for libname in libSDL-3.0.so.0 libSDL3_mixer.so.0 libGLEW.so.2.2 \
                       libpng16.so.16 libjpeg.so.62 libfreetype.so.6 \
                       libvorbis.so.0 libvorbisfile.so.3 libFLAC.so.8 \
                       libmpg123.so.0 libopus.so.0 libopenal.so.1 \
                       libz.so.1 libenet.so.7 libWavPack.so.1 \
                       libmad.so.0 libogg.so.0 libtheoraenc.so.0 \
                       libtheoradec.so.1 libtheora.so.0; do
          find /usr/lib -name "$libname*" 2>/dev/null | head -1 | xargs -I{} cp -L {} src/portable/usr/lib/ 2>/dev/null || true
        done

        # Copy additional GL libraries
        for libname in libOpenGL.so.0 libGLX.so.0 libGLdispatch.so.0 libGL.so.1; do
          find /usr/lib -name "$libname*" 2>/dev/null | head -1 | xargs -I{} cp -L {} src/portable/usr/lib/ 2>/dev/null || true
        done

        # Create launcher script
        cat > src/portable/doomlegacy.sh << 'LAUNCHER'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        export LD_LIBRARY_PATH="${SCRIPT_DIR}/usr/lib:${LD_LIBRARY_PATH}"
        export SDL_VIDEODRIVER=x11
        exec "${SCRIPT_DIR}/usr/bin/doomlegacy" "$@"
        LAUNCHER
        chmod +x src/portable/doomlegacy.sh

        # Create desktop file
        cat > src/portable/doomlegacy.desktop << 'DESKTOP'
        [Desktop Entry]
        Name=Doom Legacy
        Comment=Classic Doom source port
        Exec=doomlegacy.sh
        Icon=doomlegacy
        Terminal=false
        Type=Application
        Categories=Game;ActionGame;
        DESKTOP
        cp src/portable/doomlegacy.desktop src/portable/usr/share/applications/

        # Fix library paths in binary
        patchelf --set-rpath '$ORIGIN/../lib' src/portable/usr/bin/doomlegacy 2>/dev/null || true

    - name: Package release
      run: |
        cd src
        # Create tar.gz for portable distribution
        tar -czf doomlegacy-portable.tar.gz -C portable .
        # Also keep legacy tar.gz for dependency-less version
        tar -czf doomlegacy-linux.tar.gz -C release-linux .

    - name: Upload Linux release
      uses: actions/upload-artifact@v5
      with:
        name: doomlegacy-linux
        path: |
          src/doomlegacy-linux.tar.gz
          src/doomlegacy-portable.tar.gz
        retention-days: 30
        if-no-files-found: error
