name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Linux build with tests
  linux-build:
    runs-on: self-hosted
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: linux-build
        submodules: false

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake \
            g++ \
            libsdl1.2-dev \
            libsdl-mixer1.2-dev \
            libpng-dev \
            libjpeg-dev \
            libenet-dev \
            libglu1-mesa-dev \
            flex \
            lemon \
            cppcheck
        # Create SDL symlink if missing (code uses SDL/SDL.h)
        sudo ln -sf /usr/include/SDL /usr/include/SDL || true

    - name: Configure and Build
      run: |
        cd linux-build/legacy/trunk
        rm -rf build
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_MODERN_NETWORKING=OFF -DUSE_CDROM=OFF -DUSE_SOUND=ON -DUSE_SDL2=OFF -DCMAKE_EXPORT_COMPILE_COMMANDS=ON  # Disable CDROM for SDL2 compatibility
        # Build main executable, tools, and tests
        cmake --build . --target doomlegacy d2h wadtool test_fixed_t test_vector test_console test_actor test_save_load_unit --parallel 4 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "Build succeeded"
        else
          echo "Build failed - see summary below"
          echo "Looking for error summarizer script..."
          find ../../ -name "build_error_summarizer.py" 2>/dev/null || echo "Script not found"
          python3 ../../build_error_summarizer.py < build.log || echo "Error summarizer failed"
          exit 1
        fi

    # Code formatting check removed - clang-format not installed

    # Clang-tidy check removed - not installed in CI

    - name: Run Tests
      run: |
        cd linux-build/legacy/trunk/build
        ctest --output-on-failure -R "fixed_t|vector|console|save_load" || true

    - name: Upload Linux executables and tools
      uses: actions/upload-artifact@v4
      with:
        name: doomlegacy-linux-executables
        path: |
          linux-build/legacy/trunk/build/doomlegacy
          linux-build/legacy/trunk/build/d2h
          linux-build/legacy/trunk/build/wadtool
        retention-days: 30
        if-no-files-found: warn

    # cppcheck disabled - takes too long
    # - name: cppcheck static analysis
    #   run: |
    #     cppcheck \
    #       --enable=warning,style,performance,portability \
    #       --suppress=missingIncludeSystem \
    #       --suppress=unmatchedSuppression \
    #       --std=c++11 \
    #       --platform=win64 \
    #       -I legacy/trunk/include \
    #       -I legacy/trunk/include/core \
    #       -I legacy/trunk/include/game \
    #       -I legacy/trunk/include_stubs \
    #       --error-exitcode=0 \
    #       --output-file=cppcheck-report.txt \
    #       legacy/trunk/engine legacy/trunk/util legacy/trunk/video \
    #       2>&1 | tail -20 || true
    #     echo "=== cppcheck summary ==="
    #     grep -c "error\|warning" cppcheck-report.txt 2>/dev/null && \
    #       echo "Full report: cppcheck-report.txt" || echo "No issues found"
