name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan — Sunday 3 AM UTC
    - cron: '0 3 * * 0'

jobs:
  codeql:
    name: CodeQL (C++)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake ninja-build pkg-config g++ \
            libsdl2-dev libsdl2-mixer-dev \
            libglew-dev \
            libpng-dev libjpeg-dev \
            zlib1g-dev \
            libopenal-dev \
            libvorbis-dev libflac-dev libmpg123-dev libopus-dev libopusfile-dev \
            libfreetype-dev \
            libenet-dev \
            libwavpack-dev \
            flex bison lemon

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        # Focus on security + correctness queries
        queries: security-extended,security-and-quality

    - name: Configure CMake
      run: |
        cd src
        mkdir -p build-codeql
        cd build-codeql
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DUSE_MODERN_NETWORKING=ON

    - name: Build (CodeQL traces the compiler)
      run: |
        cd src/build-codeql
        cmake --build . --target test_fixed_t test_fixed_catch2 \
              test_vector test_console test_actor test_save_load_unit \
              --parallel

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"
