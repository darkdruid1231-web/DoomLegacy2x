name: CodeQL Analysis (DISABLED)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly deep scan — Sunday 3 AM UTC
    - cron: '0 3 * * 0'

# DISABLED - manually enable when ready
if: false

jobs:
  codeql:
    name: CodeQL (C++)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            cmake g++ \
            libsdl2-dev libsdl2-mixer-dev \
            libpng-dev libjpeg-dev \
            libenet-dev libglu1-mesa-dev \
            flex lemon

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: cpp
        # Focus on security + correctness queries
        queries: security-extended,security-and-quality

    - name: Configure CMake
      run: |
        cd src
        mkdir -p build-codeql
        cd build-codeql
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DUSE_MODERN_NETWORKING=ON

    - name: Build (CodeQL traces the compiler)
      run: |
        cd src/build-codeql
        cmake --build . --target test_fixed_t test_fixed_catch2 \
              test_vector test_console test_actor test_save_load_unit \
              --parallel

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:cpp"
