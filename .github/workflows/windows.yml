name: Windows Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        # Windows dependencies - SDL2, etc.
        # For MSVC, use vcpkg or prebuilt
        # Assuming MSVC with prebuilt SDL
        # Add SDL2 binaries to PATH or use vcpkg

    - name: Configure CMake
      run: |
        cd legacy\trunk
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -DUSE_MODERN_NETWORKING=OFF -DUSE_CDROM=OFF -DUSE_SOUND=ON -DUSE_SDL2=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build
      run: |
        cd legacy\trunk\build
        cmake --build . --config Release --target doomlegacy d2h wadtool test_fixed_t test_vector test_console test_actor test_save_load_unit --parallel 4

    - name: Run tests
      run: |
        cd legacy\trunk\build
        # Run tests if any